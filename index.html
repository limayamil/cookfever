<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7efe2">
    <title>Cookfever</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,600..800,70,0..1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="library-view" id="libraryView" aria-labelledby="appTitle">
        <header class="masthead">
          <div>
            <p class="kicker">recetario mobile</p>
            <h1 id="appTitle">Cookfever</h1>
          </div>
          <div class="masthead-actions">
            <button class="file-button" id="uploadButton" type="button" aria-label="Cargar receta Markdown">.md</button>
            <input id="recipeFile" type="file" accept=".md,text/markdown,text/plain" hidden>
            <button class="icon-button" id="reloadButton" type="button" aria-label="Recargar recetas" title="Recargar recetas">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </header>

        <div class="daily-note">
          <p>Elegí una receta y avanzá como si pasaras páginas. Ingredientes siempre a mano, fuego traducido a intensidades concretas y pasos pensados para arrancar sin experiencia.</p>
        </div>

        <section class="recipe-list" id="recipeList" aria-label="Recetas disponibles"></section>
      </section>

      <section class="reader-view" id="readerView" aria-live="polite" hidden>
        <header class="reader-topbar">
          <button class="plain-button" id="backButton" type="button">← Recetas</button>
          <button class="plain-button" id="ingredientsToggle" type="button" aria-expanded="false" aria-controls="ingredientsDrawer">Ingredientes</button>
        </header>

        <aside class="ingredients-drawer" id="ingredientsDrawer" hidden>
          <div class="drawer-head">
            <h2>Ingredientes</h2>
            <span id="servingsBadge"></span>
          </div>
          <ul id="drawerIngredients"></ul>
        </aside>

        <article class="recipe-book" aria-labelledby="recipeTitle">
          <div class="recipe-meta-row">
            <span id="recipeTime"></span>
            <span id="recipeDifficulty"></span>
          </div>
          <h1 id="recipeTitle"></h1>
          <p id="recipeIntro" class="recipe-intro"></p>

          <div class="page-card" id="stepCard"></div>

          <nav class="step-nav" aria-label="Navegacion de pasos">
            <button class="nav-button" id="previousStep" type="button">Anterior</button>
            <div class="step-counter" id="stepCounter"></div>
            <button class="nav-button primary" id="nextStep" type="button">Siguiente</button>
          </nav>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
